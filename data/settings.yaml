# Docky - Configuration globale
server:
  host: "0.0.0.0"
  port: 8000

llm:
  endpoint: ""       # URL de l'API compatible OpenAI (ex: http://localhost:11434/v1 pour Ollama)
  api_key: ""        # Clé API (si nécessaire)
  model: ""          # Nom du modèle (ex: llama3.1, deepseek-chat, etc.)

firecrawl:
  endpoint: ""        # URL de l'API compatible Firecrawl/WebClaw (ex: http://webclaw:3002/v1). Vide = https://api.firecrawl.dev/v1
  api_key: ""         # Clé API Firecrawl cloud (pas nécessaire pour WebClaw self-hosté)

security:
  jwt_secret: "CHANGE_ME"  # Secret pour signer les tokens JWT
  jwt_algorithm: "HS256"
  jwt_expire_minutes: 1440  # 24h

agents:
  - name: "Serveur Local"
    url: "http://localhost:8080"
    api_key: "change-this-to-your-agent-key"