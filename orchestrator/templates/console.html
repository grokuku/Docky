<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console - {{ name or container }} ({{ agent }})</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .popup-header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .popup-title {
            color: #c9d1d9;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .popup-status {
            color: #8b949e;
            font-size: 11px;
            margin-left: auto;
        }
        .console-output {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.45;
        }
        .console-output::-webkit-scrollbar { width: 10px; }
        .console-output::-webkit-scrollbar-track { background: #0d1117; }
        .console-output::-webkit-scrollbar-thumb { background: #30363d; border-radius: 5px; }
        .term-line { color: #c9d1d9; }
        .term-info { color: #58a6ff; }
        .term-cmd { color: #4caf50; }
        .term-error { color: #f85149; }
        .term-empty { color: #8b949e; font-style: italic; }
        .console-input-area {
            display: flex;
            align-items: center;
            background: #161b22;
            border-top: 1px solid #30363d;
            padding: 8px 12px;
            flex-shrink: 0;
        }
        .console-prompt {
            color: #4caf50;
            margin-right: 8px;
            font-weight: bold;
        }
        .console-input {
            flex: 1;
            background: #0d1117;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 6px 10px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }
        .console-input:focus { border-color: #4caf50; }
        .run-btn {
            background: #238636;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 6px 14px;
            margin-left: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
        }
        .run-btn:hover { background: #2ea043; }
        .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="popup-header">
        <span class="popup-title">🖥 Console - {{ name or container }} ({{ agent }})</span>
        <span class="popup-status" id="status">prêt</span>
    </div>
    <div class="console-output" id="console-output">
        <div class="term-info">— Connecté. Tapez vos commandes puis appuyez sur Entrée. —</div>
        <div class="term-empty">Astuce: utilisez ↑/↓ pour naviguer dans l'historique.</div>
    </div>
    <div class="console-input-area">
        <span class="console-prompt">$</span>
        <input type="text" class="console-input" id="console-input" placeholder="Tapez une commande…" autocomplete="off" spellcheck="false">
        <button class="run-btn" id="run-btn" onclick="PopupConsole.runCommand()">Run</button>
    </div>

    <script>
        const PopupConsole = {
            agent: "{{ agent }}",
            container: "{{ container }}",
            history: [],
            historyIndex: -1,
            busy: false,

            init() {
                const input = document.getElementById("console-input");
                input.addEventListener("keydown", (e) => this.onKeydown(e));
                input.focus();
            },

            onKeydown(e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    this.runCommand();
                } else if (e.key === "ArrowUp") {
                    e.preventDefault();
                    this.navigateHistory(-1);
                } else if (e.key === "ArrowDown") {
                    e.preventDefault();
                    this.navigateHistory(1);
                }
            },

            navigateHistory(dir) {
                if (this.history.length === 0) return;
                if (dir === -1) {
                    if (this.historyIndex === -1) this.historyIndex = this.history.length - 1;
                    else if (this.historyIndex > 0) this.historyIndex--;
                } else {
                    if (this.historyIndex === -1) return;
                    this.historyIndex++;
                    if (this.historyIndex >= this.history.length) {
                        this.historyIndex = -1;
                        document.getElementById("console-input").value = "";
                        return;
                    }
                }
                document.getElementById("console-input").value = this.history[this.historyIndex] || "";
            },

            appendLine(text, cls) {
                const out = document.getElementById("console-output");
                const div = document.createElement("div");
                div.className = "term-line" + (cls ? " " + cls : "");
                div.textContent = text;
                out.appendChild(div);
                out.scrollTop = out.scrollHeight;
            },

            setStatus(msg) {
                const el = document.getElementById("status");
                if (el) el.textContent = msg;
            },

            async runCommand() {
                if (this.busy) return;
                const input = document.getElementById("console-input");
                const cmd = input.value.trim();
                if (!cmd) return;

                // Display the command
                this.appendLine("$ " + cmd, "term-cmd");

                // Save to history
                this.history.push(cmd);
                this.historyIndex = -1;
                input.value = "";

                this.busy = true;
                document.getElementById("run-btn").disabled = true;
                this.setStatus("exécution…");

                const agent = encodeURIComponent(this.agent);
                const container = encodeURIComponent(this.container);
                const url = `/api/containers/${container}/exec?agent=${agent}`;
                try {
                    const resp = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ command: cmd }),
                        credentials: "same-origin",
                    });
                    if (resp.status === 401) {
                        window.location.href = "/login";
                        return;
                    }
                    const data = await resp.json();
                    if (resp.ok && data.success) {
                        const output = data.output || "";
                        if (output) {
                            // Split output into lines for better readability
                            const lines = output.split("\n");
                            for (const line of lines) {
                                this.appendLine(line);
                            }
                        } else {
                            this.appendLine("(aucune sortie)", "term-empty");
                        }
                    } else {
                        const detail = data.detail || data.error || ("Erreur " + resp.status);
                        this.appendLine("Erreur: " + detail, "term-error");
                    }
                    this.setStatus("prêt");
                } catch (e) {
                    this.appendLine("Erreur réseau: " + e.message, "term-error");
                    this.setStatus("erreur");
                } finally {
                    this.busy = false;
                    document.getElementById("run-btn").disabled = false;
                    document.getElementById("console-input").focus();
                }
            },
        };

        document.addEventListener("DOMContentLoaded", () => PopupConsole.init());
    </script>
</body>
</html>
