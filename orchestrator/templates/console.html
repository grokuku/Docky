<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console - {{ name }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background: #0d1117; overflow: hidden; display: flex; flex-direction: column; }
        .popup-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .popup-header h2 { margin: 0; font-size: 0.95rem; color: var(--text-primary); }
        .popup-header .status { font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; }
        .status.connected { color: var(--success); }
        .status.disconnected { color: var(--danger); }
        #terminal-container { flex: 1; padding: 8px; overflow: hidden; }
        #terminal { height: 100%; }
        /* Override xterm.js background to match theme */
        .xterm-viewport { background: #0d1117 !important; }
    </style>
</head>
<body>
    <div class="popup-header">
        <h2>🖥️ {{ name }}</h2>
        <span class="status" id="status">connexion…</span>
    </div>
    <div id="terminal-container">
        <div id="terminal"></div>
    </div>
    <script>
        // Variables from server
        const AGENT = '{{ agent }}';
        const CONTAINER = '{{ container }}';

        const term = new Terminal({
            cursorBlink: true,
            cursorStyle: 'block',
            fontSize: 13,
            fontFamily: "'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace",
            theme: {
                background: '#0d1117',
                foreground: '#c9d1d9',
                cursor: '#c9d1d9',
                selectionBackground: '#30363d',
                black: '#484f58',
                red: '#ff7b72',
                green: '#3fb950',
                yellow: '#d29922',
                blue: '#58a6ff',
                magenta: '#bc8cff',
                cyan: '#39c5cf',
                white: '#b1bac4',
                brightBlack: '#6e7681',
                brightRed: '#ffa198',
                brightGreen: '#56d364',
                brightYellow: '#e3b341',
                brightBlue: '#79c0ff',
                brightMagenta: '#d2a8ff',
                brightCyan: '#56d4dd',
                brightWhite: '#f0f6fc',
            }
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        let ws = null;
        let reconnectTimer = null;
        const statusEl = document.getElementById('status');

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = `${protocol}//${window.location.host}/api/containers/${encodeURIComponent(CONTAINER)}/exec?agent=${encodeURIComponent(AGENT)}`;

            ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                statusEl.textContent = 'connecté';
                statusEl.className = 'status connected';
                sendResize();
                term.focus();
            };

            ws.onmessage = (event) => {
                if (event.data instanceof ArrayBuffer) {
                    term.write(new Uint8Array(event.data));
                } else {
                    term.write(event.data);
                }
            };

            ws.onclose = (event) => {
                statusEl.textContent = 'déconnecté';
                statusEl.className = 'status disconnected';
                if (event.code !== 1000) {
                    term.write(`\r\n\x1b[31mConnexion perdue (${event.code})\x1b[0m\r\n`);
                }
                // Auto-reconnect after 3s
                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(connect, 3000);
            };

            ws.onerror = () => {
                statusEl.textContent = 'erreur';
                statusEl.className = 'status disconnected';
            };
        }

        function sendResize() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            const dims = fitAddon.proposeDimensions();
            if (dims) {
                ws.send(JSON.stringify({
                    type: 'resize',
                    cols: dims.cols,
                    rows: dims.rows
                }));
            }
        }

        // Send keystrokes to container
        term.onData(data => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(data);
            }
        });

        // Resize handling
        const resizeObserver = new ResizeObserver(() => {
            fitAddon.fit();
            sendResize();
        });
        resizeObserver.observe(document.getElementById('terminal-container'));

        // Connect
        connect();

        // Close WebSocket on page unload
        window.addEventListener('beforeunload', () => {
            if (reconnectTimer) clearTimeout(reconnectTimer);
            if (ws) ws.close();
        });
    </script>
</body>
</html>
