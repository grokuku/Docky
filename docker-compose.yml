# Docky - Exemple de déploiement complet (Orchestrateur + Agent)
# Ce fichier montre comment déployer les deux services sur un même serveur.
# Pour un déploiement multi-serveurs, déployez l'agent séparément sur chaque serveur.

services:
  docky:
    # Option 1: image pré-build (recommandé)
    image: ghcr.io/grokuku/docky:latest
    # Option 2: build local
    # build: ./orchestrator
    container_name: docky
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - DOCKY_DATA_DIR=/data
    depends_on:
      - docky-agent

  docky-agent:
    # Option 1: image pré-build (recommandé)
    image: ghcr.io/grokuku/docky-agent:latest
    # Option 2: build local
    # build: ./agent
    container_name: docky-agent
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./agent-data:/data
    environment:
      - DOCKY_AGENT_API_KEY=change-this-to-your-secret-key
      - DOCKY_DATA_DIR=/data

networks:
  default:
    name: docky-network