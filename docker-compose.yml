# Docky - Exemple de déploiement complet (Orchestrateur + Agent)
# Copiez .env.example en .env et modifiez les valeurs avant de lancer.
# Usage: docker compose up -d

services:
  docky:
    image: ghcr.io/grokuku/docky:${DOCKY_VERSION:-latest}
    container_name: docky
    restart: unless-stopped
    ports:
      - "${DOCKY_PORT:-8000}:8000"
    volumes:
      - ./data:/data
    environment:
      - DOCKY_DATA_DIR=/data

  docky-agent:
    image: ghcr.io/grokuku/docky-agent:${DOCKY_VERSION:-latest}
    container_name: docky-agent
    restart: unless-stopped
    ports:
      - "${DOCKY_AGENT_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./agent-data:/data
    environment:
      - DOCKY_AGENT_API_KEY=${DOCKY_AGENT_API_KEY}
      - DOCKY_DATA_DIR=/data

networks:
  default:
    name: docky-network